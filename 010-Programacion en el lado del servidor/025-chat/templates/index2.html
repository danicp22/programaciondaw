<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Minichat</title>
    <style>
        *{
            box-sizing:border-box;
        }
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f4f6f8;
            color:#222;
        }
        .contenedor{
            width:90%;
            max-width:800px;
            margin:40px auto;
            background:white;
            border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
            overflow:hidden;
        }
        .cabecera{
            background:#2d6cdf;
            color:white;
            padding:20px;
        }
        .cabecera h1{
            margin:0;
            font-size:24px;
        }
        .formulario{
            padding:20px;
            border-bottom:1px solid #e5e7eb;
            display:flex;
            flex-direction:column;
            gap:12px;
        }
        input, button{
            padding:12px;
            border-radius:8px;
            border:1px solid #cfd6dd;
            font-size:16px;
        }
        input:focus{
            outline:none;
            border-color:#2d6cdf;
        }
        button{
            background:#2d6cdf;
            color:white;
            border:none;
            cursor:pointer;
            transition:0.2s;
        }
        button:hover{
            background:#1f57bb;
        }
        .mensajes{
            padding:20px;
            max-height:500px;
            overflow-y:auto;
            background:#fafbfc;
        }
        .mensaje{
            background:white;
            border:1px solid #e5e7eb;
            border-radius:10px;
            padding:12px;
            margin-bottom:12px;
            box-shadow:0 2px 6px rgba(0,0,0,0.04);
        }
        .meta{
            font-size:13px;
            color:#666;
            margin-bottom:6px;
        }
        .usuario{
            font-weight:bold;
            color:#2d6cdf;
        }
        .texto{
            font-size:16px;
            white-space:pre-wrap;
        }
        .vacio{
            color:#888;
            text-align:center;
            padding:30px;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="cabecera">
            <h1>Minichat</h1>
        </div>

        <form class="formulario" method="post">
            <input type="text" name="usuario" placeholder="Tu nombre" required>
            <input type="text" name="mensaje" placeholder="Escribe un mensaje" required>
            <button type="submit">Enviar</button>
        </form>

        <div class="mensajes" id="mensajes"></div>
    </div>

    <script>
        async function cargarMensajes() {
            const respuesta = await fetch("/mensajes");
            const datos = await respuesta.json();

            const contenedor = document.getElementById("mensajes");
            contenedor.innerHTML = "";

            if (datos.length === 0) {
                contenedor.innerHTML = '<div class="vacio">Todavía no hay mensajes</div>';
                return;
            }

            datos.forEach(function(item) {
                const div = document.createElement("div");
                div.className = "mensaje";
                div.innerHTML = `
                    <div class="meta">
                        <span class="usuario">${item.usuario}</span> - ${item.hora}
                    </div>
                    <div class="texto">${item.mensaje}</div>
                `;
                contenedor.appendChild(div);
            });

            contenedor.scrollTop = contenedor.scrollHeight;
        }

        cargarMensajes();
        setInterval(cargarMensajes, 1000);
    </script>
</body>
</html>
